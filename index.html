<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    /* Scales the video to cover the whole screen, cropping edges if needed */
    .video-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }
    .video-wrap iframe {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      /* 177.78vh keeps 16:9 ratio when scaling to viewport height */
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.78vh;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <iframe
      src="https://player.vimeo.com/video/1105686323?h=ade60f99eb&background=1&autoplay=1&loop=1&muted=1"
      frameborder="0"
      allow="autoplay; fullscreen"
      allowfullscreen></iframe>
  </div>
</body>
</html>
